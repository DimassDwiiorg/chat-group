<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaxy Chat Group</title>
  <style>
    /* --- GALAXY THEME & BASE STYLES --- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Glassmorphism Container */
    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    .hidden { display: none !important; }

    /* --- AUTH FORM STYLES --- */
    .auth-container {
      width: 100%;
      max-width: 400px;
      padding: 30px;
      text-align: center;
    }

    .auth-container h2 {
      margin-bottom: 20px;
      color: #8A2BE2;
      text-shadow: 0 0 10px rgba(138, 43, 226, 0.5);
    }

    .tab-buttons {
      display: flex;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .tab-btn.active {
      color: #00ffff;
      border-bottom: 2px solid #00ffff;
    }

    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%;
      padding: 12px 15px;
      margin: 8px 0;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #fff;
      outline: none;
    }

    input:focus {
      border-color: #00ffff;
      box-shadow: 0 0 8px rgba(0, 255, 255, 0.3);
    }

    button.btn-primary {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: linear-gradient(45deg, #8A2BE2, #00ffff);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button.btn-primary:hover {
      opacity: 0.9;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
    }

    /* --- CHAT INTERFACE --- */
    .chat-container {
      width: 90vw;
      max-width: 900px;
      height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .chat-header {
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .user-profile-summary {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #00ffff;
    }

    /* Messages Box */
    .chat-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 80%;
    }

    .message.mine {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message-content {
      background: rgba(255, 255, 255, 0.08);
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .message.mine .message-content {
      background: rgba(138, 43, 226, 0.2);
      border-color: rgba(138, 43, 226, 0.4);
    }

    .username-tag {
      font-size: 0.85em;
      font-weight: bold;
      margin-bottom: 4px;
      display: block;
    }

    .message-text {
      font-size: 0.95em;
      word-break: break-word;
    }

    .timestamp {
      font-size: 0.7em;
      color: #888;
      margin-top: 4px;
      text-align: right;
    }

    /* Input Box */
    .chat-input-area {
      padding: 15px;
      display: flex;
      gap: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .chat-input-area input {
      flex: 1;
      margin: 0;
    }

    .chat-input-area button {
      width: auto;
      padding: 0 20px;
      margin: 0;
    }

    /* Modal Edit Profile */
    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .modal-content {
      width: 320px;
      padding: 25px;
      position: relative;
    }

    .close-modal {
      position: absolute;
      top: 10px; right: 15px;
      cursor: pointer;
      font-size: 1.2em;
    }
  </style>
</head>
<body>

  <!-- ================= AUTH CONTAINER ================= -->
  <div id="auth-section" class="glass-card auth-container">
    <h2>GALAXY CHAT</h2>
    <div class="tab-buttons">
      <button class="tab-btn active" onclick="switchTab('email')">Magic Email</button>
      <button class="tab-btn" onclick="switchTab('username')">Username</button>
    </div>

    <!-- Form Magic Email (Passwordless) -->
    <div id="form-email">
      <p style="font-size: 0.85em; color: #ccc; margin-bottom: 10px;">Masuk tanpa password via link email.</p>
      <input type="email" id="email-input" placeholder="Masukkan Email Anda...">
      <button class="btn-primary" onclick="sendMagicLink()">Kirim Link Login</button>
    </div>

    <!-- Form Username + Password -->
    <div id="form-username" class="hidden">
      <input type="text" id="user-input" placeholder="Username (huruf & angka)">
      <input type="password" id="pass-input" placeholder="Password (min. 6 karakter)">
      <button class="btn-primary" onclick="loginWithUsername()">Login / Daftar</button>
    </div>
  </div>

  <!-- ================= CHAT CONTAINER ================= -->
  <div id="chat-section" class="glass-card chat-container hidden">
    <!-- Header -->
    <div class="chat-header">
      <h3>✨ Galaxy Lounge</h3>
      <div class="user-profile-summary" onclick="openProfileModal()">
        <img id="my-avatar" src="https://via.placeholder.com/40" class="avatar" alt="PP">
        <span id="my-username" style="font-weight: bold;">User</span>
      </div>
    </div>

    <!-- Area Pesan -->
    <div id="chat-messages" class="chat-messages"></div>

    <!-- Form Kirim Pesan -->
    <div class="chat-input-area">
      <input type="text" id="message-input" placeholder="Ketik pesan galaxy..." onkeypress="handleKeyPress(event)">
      <button class="btn-primary" onclick="sendMessage()">Kirim</button>
    </div>
  </div>

  <!-- ================= MODAL EDIT PROFILE ================= -->
  <div id="profile-modal" class="modal hidden">
    <div class="glass-card modal-content">
      <span class="close-modal" onclick="closeProfileModal()">&times;</span>
      <h3 style="margin-bottom: 15px;">Edit Profil</h3>
      <label style="font-size: 0.8em;">Ganti Username:</label>
      <input type="text" id="edit-username-input">

      <button class="btn-primary" onclick="saveProfile()">Simpan</button>
      <button style="width:100%; background:transparent; border:none; color:#ff4d4d; margin-top:10px; cursor:pointer;" onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- ================= FIREBASE & APP LOGIC ================= -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
      getAuth, isSignInWithEmailLink, signInWithEmailLink, sendSignInLinkToEmail, 
      signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { 
      getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, getDoc 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Konfigurasi Firebase Anda
    const firebaseConfig = {
      apiKey: "AIzaSyCJMRTfrl3j1jL2Bii4cG1IYD1ZoYHrp4Q",
      authDomain: "galaxy-chat-app-31da3.firebaseapp.com",
      projectId: "galaxy-chat-app-31da3",
      storageBucket: "galaxy-chat-app-31da3.firebasestorage.app",
      messagingSenderId: "662698919289",
      appId: "1:662698919289:web:87782761ee54b4b366dba8"
    };

    // Inisialisasi Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUserData = null;

    // --- ALUR AUTENTIKASI ---

    // Passwordless Email Link Handler
    window.sendMagicLink = async () => {
      const email = document.getElementById('email-input').value.trim();
      if (!email) return alert('Masukkan email!');

      const actionCodeSettings = {
        url: window.location.href,
        handleCodeInApp: true,
      };

      try {
        await sendSignInLinkToEmail(auth, email, actionCodeSettings);
        window.localStorage.setItem('emailForSignIn', email);
        alert('Link login telah dikirim ke email kamu! Cek Inbox/Spam.');
      } catch (err) {
        alert('Gagal mengirim email: ' + err.message);
      }
    };

    // Cek jika halaman dibuka dari Link Email
    if (isSignInWithEmailLink(auth, window.location.href)) {
      let email = window.localStorage.getItem('emailForSignIn');
      if (!email) {
        email = window.prompt('Masukkan email kamu kembali untuk verifikasi:');
      }
      signInWithEmailLink(auth, email, window.location.href)
        .then(async (result) => {
          window.localStorage.removeItem('emailForSignIn');
          await initUserProfile(result.user, email.split('@')[0]);
        })
        .catch((err) => alert('Gagal login via link: ' + err.message));
    }

    // Login / Register via Username + Password (PERBAIKAN)
    window.loginWithUsername = async () => {
      const usernameInput = document.getElementById('user-input').value.trim();
      const pass = document.getElementById('pass-input').value;

      if (!usernameInput || !pass) return alert('Isi username dan password!');
      if (pass.length < 6) return alert('Password minimal harus 6 karakter!');

      const cleanUsername = usernameInput.toLowerCase().replace(/[^a-z0-9]/g, '');
      if (!cleanUsername) return alert('Username hanya boleh berisi huruf dan angka!');

      // Menggunakan domain resmi firebaseapp.com
      const dummyEmail = `${cleanUsername}@${firebaseConfig.projectId}.firebaseapp.com`;

      try {
        const res = await signInWithEmailAndPassword(auth, dummyEmail, pass);
        await initUserProfile(res.user, usernameInput);
      } catch (err) {
        if (
          err.code === 'auth/user-not-found' || 
          err.code === 'auth/invalid-credential' ||
          err.code === 'auth/invalid-email'
        ) {
          try {
            const newRes = await createUserWithEmailAndPassword(auth, dummyEmail, pass);
            await initUserProfile(newRes.user, usernameInput);
          } catch (createErr) {
            alert('Gagal membuat akun: ' + createErr.message);
          }
        } else {
          alert('Error Login: ' + err.message);
        }
      }
    };

    // Inisialisasi Data Profil di Firestore
    async function initUserProfile(user, defaultUsername) {
      try {
        const userRef = doc(db, "users", user.uid);
        const docSnap = await getDoc(userRef);

        if (!docSnap.exists()) {
          const avatarUrl = `https://api.dicebear.com/7.x/bottts/svg?seed=${encodeURIComponent(defaultUsername || user.uid)}`;
          
          const newData = {
            uid: user.uid,
            username: defaultUsername || "GalaxyUser",
            photoURL: avatarUrl,
            userColor: generateUniqueColor(defaultUsername || user.uid)
          };
          
          await setDoc(userRef, newData);
          currentUserData = newData;
        } else {
          currentUserData = docSnap.data();
        }
        
        updateUI();
        loadMessages();
      } catch (error) {
        console.error("Error Firestore:", error);
        alert("Gagal memuat profil: " + error.message);
      }
    }

    // Generator Warna Hashing
    function generateUniqueColor(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
      }
      const h = Math.abs(hash) % 360;
      return `hsl(${h}, 80%, 65%)`;
    }

    // Observer Status Login
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        await initUserProfile(user, user.email ? user.email.split('@')[0] : 'User');
      } else {
        document.getElementById('auth-section').classList.remove('hidden');
        document.getElementById('chat-section').classList.add('hidden');
      }
    });

    function updateUI() {
      if (!currentUserData) return;
      document.getElementById('auth-section').classList.add('hidden');
      document.getElementById('chat-section').classList.remove('hidden');

      document.getElementById('my-username').innerText = currentUserData.username;
      document.getElementById('my-username').style.color = currentUserData.userColor;
      document.getElementById('my-avatar').src = currentUserData.photoURL;
    }

    // --- FITUR CHAT REAL-TIME (PERBAIKAN TIMESTAMP) ---
    window.sendMessage = async () => {
      const input = document.getElementById('message-input');
      const text = input.value.trim();
      if (!text || !currentUserData) return;

      input.value = '';

      try {
        await addDoc(collection(db, "messages"), {
          uid: currentUserData.uid,
          username: currentUserData.username,
          userColor: currentUserData.userColor || '#00f3ff',
          photoURL: currentUserData.photoURL,
          text: text,
          createdAt: serverTimestamp()
        });
      } catch (err) {
        console.error("Gagal mengirim:", err);
        alert("Gagal mengirim pesan!");
      }
    };

    window.handleKeyPress = (e) => {
      if (e.key === 'Enter') sendMessage();
    };

    function loadMessages() {
      const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));
      onSnapshot(q, (snapshot) => {
        const container = document.getElementById('chat-messages');
        container.innerHTML = '';

        snapshot.forEach((doc) => {
          const msg = doc.data();
          const isMine = msg.uid === currentUserData?.uid;

          const msgEl = document.createElement('div');
          msgEl.className = `message ${isMine ? 'mine' : ''}`;

          // Penanganan Timestamp Aman agar tidak crash saat baru dikirim
          let timeStr = 'Baru saja';
          if (msg.createdAt && msg.createdAt.toDate) {
            timeStr = msg.createdAt.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
          }

          msgEl.innerHTML = `
            <img src="${msg.photoURL}" class="avatar" alt="Avatar">
            <div class="message-content">
              <span class="username-tag" style="color: ${msg.userColor || '#00f3ff'};">${msg.username || 'User'}</span>
              <div class="message-text">${escapeHTML(msg.text || '')}</div>
              <div class="timestamp">${timeStr}</div>
            </div>
          `;
          container.appendChild(msgEl);
        });

        // Auto Scroll ke bawah
        container.scrollTop = container.scrollHeight;
      }, (err) => {
        console.error("Error Snapshot:", err);
      });
    }

    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, 
        tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
      );
    }

    // --- FITUR PROFILE MODAL ---
    window.openProfileModal = () => {
      document.getElementById('edit-username-input').value = currentUserData.username;
      document.getElementById('profile-modal').classList.remove('hidden');
    };

    window.closeProfileModal = () => {
      document.getElementById('profile-modal').classList.add('hidden');
    };

    window.saveProfile = async () => {
      const newUsername = document.getElementById('edit-username-input').value.trim();
      
      if (!newUsername) return alert('Username tidak boleh kosong!');

      const userRef = doc(db, "users", currentUserData.uid);
      const updatedData = {
        username: newUsername,
        userColor: generateUniqueColor(newUsername)
      };

      await setDoc(userRef, updatedData, { merge: true });
      currentUserData = { ...currentUserData, ...updatedData };

      updateUI();
      closeProfileModal();
      alert('Profil berhasil diperbarui!');
    };

    window.logout = () => {
      signOut(auth).then(() => {
        closeProfileModal();
        location.reload();
      });
    };

    // UI Tab Switcher
    window.switchTab = (tab) => {
      const btnEmail = document.querySelectorAll('.tab-btn')[0];
      const btnUser = document.querySelectorAll('.tab-btn')[1];
      const formEmail = document.getElementById('form-email');
      const formUser = document.getElementById('form-username');

      if (tab === 'email') {
        btnEmail.classList.add('active');
        btnUser.classList.remove('active');
        formEmail.classList.remove('hidden');
        formUser.classList.add('hidden');
      } else {
        btnUser.classList.add('active');
        btnEmail.classList.remove('active');
        formUser.classList.remove('hidden');
        formEmail.classList.add('hidden');
      }
    };
  </script>
</body>
</html>
